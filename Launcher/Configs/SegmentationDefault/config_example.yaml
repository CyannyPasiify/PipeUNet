config_trainer: !!python/object:Trainer.trainer_configurer.ConfigTrainerSegmentationDefault
  experiment_root_dir: Experiments
  experiment_name: PipeUNet-3DUNet
  experiment_version: Train-001
  trainer_init_args: !!python/object:Trainer.trainer_configurer.TrainerInitArgs
    accelerator: gpu
    devices:
    - 0
    precision: 32
    enable_distributed_data_parallel: false
    max_epochs: 100
    check_val_every_n_epoch: 1
    accumulate_grad_batches: 16
    gradient_clip_val: null
    gradient_clip_algorithm: !!python/object/apply:lightning.pytorch.utilities.enums.GradClipAlgorithmType
    - norm
    log_every_n_steps: 10
    enable_progress_bar: true
    enable_model_summary: true
    enable_checkpointing: true
    deterministic: null
    detect_anomaly: true
    num_sanity_val_steps: 2
    fast_dev_run: false
    overfit_batches: 0.0
  callback_init_args: !!python/object:Trainer.trainer_configurer.CallbackInitArgs
    callback_device_stats_monitor: !!python/object:Callback.callback_configurer.ConfigCallbackDeviceStatsMonitor
      cpu_stats: true
    callback_early_stopping: !!python/object:Callback.callback_configurer.ConfigCallbackEarlyStopping
      monitor: val/loss
      min_delta: 0.0
      patience: 20
      mode: min
      verbose: true
    callback_learning_rate_monitor: !!python/object:Callback.callback_configurer.ConfigCallbackLearningRateMonitor
      logging_interval: epoch
      log_momentum: true
      log_weight_decay: true
    callback_model_summary: null
    callback_rich_model_summary: !!python/object:Callback.callback_configurer.ConfigCallbackRichModelSummary
      max_depth: 5
    callback_rich_progressbar: !!python/object:Callback.callback_configurer.ConfigCallbackRichProgressBar
      refresh_rate: 1
      leave: true
      theme: !!python/object:lightning.pytorch.callbacks.progress.rich_progress.RichProgressBarTheme
        description: ''
        progress_bar: '#6206E0'
        progress_bar_finished: '#6206E0'
        progress_bar_pulse: '#6206E0'
        batch_progress: ''
        time: dim
        processing_speed: dim underline
        metrics: italic
        metrics_text_delimiter: ' '
        metrics_format: .3f
      console_kwargs: null
    callback_tqdm_progressbar: null
    callback_model_checkpoints:
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: milestone
      filename: '{epoch:03d}-loss={val/loss:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: epoch
      save_top_k: -1
      mode: max
      save_last: false
      every_n_epochs: 10
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/DSC
      filename: '{epoch:03d}-loss={val/loss:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/DSC
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/HD95
      filename: '{epoch:03d}-loss={val/loss:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/HD95
      save_top_k: 5
      mode: min
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/NSD
      filename: '{epoch:03d}-NSD={val/NSD:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/NSD
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/Acc
      filename: '{epoch:03d}-Acc={val/Acc:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/Acc
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/Prec
      filename: '{epoch:03d}-Prec={val/Prec:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/Prec
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/Spec
      filename: '{epoch:03d}-Spec={val/Spec:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/Spec
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/Recall
      filename: '{epoch:03d}-Recall={val/Recall:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/Recall
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/F1
      filename: '{epoch:03d}-F1={val/F1:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/F1
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
    - !!python/object:Callback.callback_configurer.ConfigCallbackModelCheckpoint
      dirpath: val/AUROC
      filename: '{epoch:03d}-AUROC={val/AUROC:4f}-DSC={val/DSC:4f}-HD95={val/HD95:4f}'
      monitor: val/AUROC
      save_top_k: 5
      mode: max
      save_last: false
      every_n_epochs: 1
  logger_init_args: !!python/object:Trainer.trainer_configurer.LoggerInitArgs
    enable_csv_logger: true
    enable_tensorboard_logger: true
    enable_wandb_logger: true
    wandb_project: PipeUNet
