module_training_step_addition_args: !!python/object:Module.module_segmentation_default.ModuleTrainingStepAdditionArgs
  inferer: !!python/name:monai.inferers.inferer.SimpleInferer ''
  inferer_init_args: {}
  metric_init_args_collection:
  - !!python/object:Module.module_segmentation_default.NamedMetricInitArgs
    class_type: !!python/name:Metric.metric_configurer.DiceScore ''
    init_args:
      include_background: false
      reduction: !!python/object/apply:monai.utils.enums.MetricReduction
      - mean
      get_not_nans: false
      ignore_empty: true
      num_classes: null
      return_with_label: false
    name: train/DSC
    description_info: Dice similarity coefficient (also known as DSC) metric (ignoring
      background) for multi-class (organs not overlapped) segmentation
    preprocess_pred_func: !!python/object:Operator.operator_misc.OperatorMonaiAsDiscrete
      argmax: true
      to_onehot: 2
      threshold: null
      rounding: null
      dim: 1
      keepdim: true
      dtype: !!torch/dtype:int32 ''
      kwargs:
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
    preprocess_gt_func: !!python/object:Operator.operator_misc.OperatorMonaiAsDiscrete
      argmax: true
      to_onehot: 2
      threshold: null
      rounding: null
      dim: 1
      keepdim: true
      dtype: !!torch/dtype:int32 ''
      kwargs:
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
    postprocess_metric_func: !!python/object:Operator.operator_misc.OperatorIdentity {}
    logger: true
    on_step: true
    on_epoch: true
    prog_bar: true
    reduce_fx: mean
    kwargs: null
