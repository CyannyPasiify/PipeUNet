config_ltn_module: !!python/object:Module.ltn_module_configurer.ConfigLightningModuleSegmentationDefault
  network_init_args: !!python/object:Module.ltn_module_segmentation_default.NamedNetworkInitArgs
    name: UNet
    description_info: Basic background/2-foreground segmentation UNet
    config_network: !!python/object:Network.network_configurer.ConfigNetworkUNet
      focuser_in_channels: 1
      focuser_out_channels: 16
      encoder_primary_in_channels: !!python/tuple
      - 16
      - 32
      encoder_primary_out_channels: !!python/tuple
      - 32
      - 64
      encoder_primary_depth: 2
      encoder_advanced_in_channels: !!python/tuple
      - 64
      - 128
      encoder_advanced_out_channels: !!python/tuple
      - 128
      - 256
      encoder_advanced_depth: 2
      bottleneck_in_channels: 256
      bottleneck_out_channels: 512
      bottleneck_depth: 2
      decoder_advanced_in_channels: !!python/tuple
      - 512
      - 256
      decoder_advanced_upsample_channels: !!python/tuple
      - 256
      - 128
      decoder_advanced_bridge_channels: !!python/tuple
      - 256
      - 128
      decoder_advanced_out_channels: !!python/tuple
      - 256
      - 128
      decoder_advanced_depth: 2
      decoder_primary_in_channels: !!python/tuple
      - 128
      - 64
      decoder_primary_upsample_channels: !!python/tuple
      - 64
      - 32
      decoder_primary_bridge_channels: !!python/tuple
      - 64
      - 32
      decoder_primary_out_channels: !!python/tuple
      - 64
      - 32
      decoder_primary_depth: 2
      auxiliary_classifier_in_channels: !!python/tuple
      - 256
      - 128
      - 64
      - 32
      auxiliary_classifier_out_channels: !!python/tuple
      - 2
      - 2
      - 2
      - 2
      distributor_in_channels: 32
      distributor_out_channels: 16
      classifier_in_channels: 16
      classifier_out_channels: 2
      reserve_io: false
  module_training_step_addition_args: !!python/object:Module.ltn_module_segmentation_default.ModuleTrainingStepAdditionArgs
    config_inferer: !!python/object:Inferer.inferer_configurer.ConfigInfererSimple {}
    metric_init_args_collection:
    - !!python/object:Module.ltn_module_segmentation_default.NamedMetricInitArgs
      name: train/DSC
      description_info: Dice similarity coefficient (also known as DSC) metric (ignoring
        background) for multi-class (organs not overlapped) segmentation
      config_metric: !!python/object:Metric.metric_configurer.ConfigMetricDiceScore
        include_background: false
        reduction: !!python/object/apply:monai.utils.enums.MetricReduction
        - mean
        get_not_nans: false
        ignore_empty: true
        num_classes: 2
        return_with_label: false
      preprocess_pred_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
        argmax: true
        to_onehot: 2
        threshold: null
        rounding: null
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
      preprocess_gt_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
        argmax: true
        to_onehot: 2
        threshold: null
        rounding: null
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
      postprocess_metric_func: !!python/object:Operator.operator_configurer.ConfigOperatorIdentity {}
      logger: true
      on_step: true
      on_epoch: true
      prog_bar: true
      reduce_fx: mean
      kwargs: null
    - !!python/object:Module.ltn_module_segmentation_default.NamedMetricInitArgs
      name: train/NSD
      description_info: Normalized surface Dice metric (ignoring background) for multi-class
        (organs not overlapped) segmentation
      config_metric: !!python/object:Metric.metric_configurer.ConfigMetricNormalizedSurfaceDiceScore
        class_thresholds:
        - 0.0
        - 3.0
        include_background: false
        distance_metric: euclidean
        reduction: !!python/object/apply:monai.utils.enums.MetricReduction
        - mean
        get_not_nans: false
        use_subvoxels: false
      preprocess_pred_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
        argmax: true
        to_onehot: 2
        threshold: null
        rounding: null
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
      preprocess_gt_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
        argmax: true
        to_onehot: 2
        threshold: null
        rounding: null
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
      postprocess_metric_func: !!python/object:Operator.operator_configurer.ConfigOperatorIdentity {}
      logger: true
      on_step: true
      on_epoch: true
      prog_bar: true
      reduce_fx: mean
      kwargs: null
    - !!python/object:Module.ltn_module_segmentation_default.NamedMetricInitArgs
      name: train/HD95
      description_info: 95% percentile Hausdorff distance metric (ignoring background)
        for multi-class (organs not overlapped) segmentation
      config_metric: !!python/object:Metric.metric_configurer.ConfigMetricHausdorffDistance
        include_background: false
        distance_metric: euclidean
        percentile: 95.0
        directed: false
        reduction: !!python/object/apply:monai.utils.enums.MetricReduction
        - mean
        get_not_nans: false
      preprocess_pred_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
        argmax: true
        to_onehot: 2
        threshold: null
        rounding: null
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
      preprocess_gt_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
        argmax: true
        to_onehot: 2
        threshold: null
        rounding: null
        dim: 1
        keepdim: true
        dtype: !!torch/dtype:int32 ''
      postprocess_metric_func: !!python/object:Operator.operator_configurer.ConfigOperatorIdentity {}
      logger: true
      on_step: true
      on_epoch: true
      prog_bar: true
      reduce_fx: mean
      kwargs: null
    - !!python/object:Module.ltn_module_segmentation_default.NamedMetricInitArgs
      name: train/ConfMat
      description_info: Confusion Matrix for multi-class (organs not overlapped) segmentation
      config_metric: !!python/object:Metric.metric_configurer.ConfigMetricMulticlassConfusionMatrix
        num_classes: 2
        ignore_index: null
        normalize: none
        validate_args: true
        kwargs: {}
      preprocess_pred_func: !!python/object:Operator.operator_configurer.ConfigOperatorMonaiAsDiscrete
