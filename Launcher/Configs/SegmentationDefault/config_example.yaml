experiment_root_dir: Experiments
experiment_name: PipeUNet-3DUNet
experiment_version: Train-001
trainer_class: !!python/name:Trainer.trainer_default_seg.TrainerSegmentationDefault ''
trainer_init_args: !!python/object:Trainer.trainer_default_seg.TrainerInitArgs
  accelerator: gpu
  devices:
  - 0
  precision: 32
  enable_distributed_data_parallel: false
  max_epochs: 100
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 16
  gradient_clip_val: null
  gradient_clip_algorithm: !!python/object/apply:lightning.pytorch.utilities.enums.GradClipAlgorithmType
  - norm
  log_every_n_steps: 10
  enable_progress_bar: true
  enable_model_summary: true
  enable_checkpointing: true
  deterministic: null
  detect_anomaly: true
  num_sanity_val_steps: 2
  fast_dev_run: false
  overfit_batches: 0.0
callback_init_args: !!python/object:Trainer.trainer_default_seg.CallbackInitArgs
  enable_device_stats_monitor: true
  device_stats_monitor_init_args: !!python/object:Callback.callback_configurer.DeviceStatsMonitorInitArgs
    cpu_stats: true
  enable_early_stopping: true
  early_stopping_init_args: !!python/object:Callback.callback_configurer.EarlyStoppingInitArgs
    monitor: val/loss
    min_delta: 0.0
    patience: 20
    mode: min
    verbose: true
  enable_learning_rate_monitor: true
  learning_rate_monitor_init_args: !!python/object:Callback.callback_configurer.LearningRateMonitorInitArgs
    logging_interval: epoch
    log_momentum: true
    log_weight_decay: true
  enable_model_summary: false
  model_summary_init_args: null
  enable_rich_model_summary: true
  rich_model_summary_init_args: !!python/object:Callback.callback_configurer.RichModelSummaryInitArgs
    max_depth: 5
  enable_rich_progressbar: true
  rich_progressbar_init_args: !!python/object:Callback.callback_configurer.RichProgressBarInitArgs
    refresh_rate: 1
    leave: true
    theme: !!python/object:lightning.pytorch.callbacks.progress.rich_progress.RichProgressBarTheme
      description: ''
      progress_bar: '#6206E0'
      progress_bar_finished: '#6206E0'
      progress_bar_pulse: '#6206E0'
      batch_progress: ''
      time: dim
      processing_speed: dim underline
      metrics: italic
      metrics_text_delimiter: ' '
      metrics_format: .3f
    console_kwargs: null
  enable_tqdm_progressbar: false
  tqdm_progressbar_init_args: null
  model_checkpoint_init_args_collection:
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: milestone
    filename: '{epoch:03d}-loss={val/loss:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: epoch
    save_top_k: -1
    mode: max
    save_last: false
    every_n_epochs: 10
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/DSC
    filename: '{epoch:03d}-loss={val/loss:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/DSC
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/HD95
    filename: '{epoch:03d}-loss={val/loss:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/HD95
    save_top_k: 5
    mode: min
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/NSD
    filename: '{epoch:03d}-NSD={val/NSD:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/NSD
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/Acc
    filename: '{epoch:03d}-Acc={val/Acc:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/Acc
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/Prec
    filename: '{epoch:03d}-Prec={val/Prec:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/Prec
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/Spec
    filename: '{epoch:03d}-spe={val/Spec:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/Spec
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/Recall
    filename: '{epoch:03d}-Recall={val/Recall:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/Recall
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/F1
    filename: '{epoch:03d}-F1={val/F1:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/F1
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
  - !!python/object:Callback.callback_configurer.ModelCheckpointInitArgs
    dirpath: val/AUROC
    filename: '{epoch:03d}-AUROC={val/AUROC:4f}-DSC={val/DSC:4f}-HD95{val/HD95:4f}'
    monitor: val/AUROC
    save_top_k: 5
    mode: max
    save_last: false
    every_n_epochs: 1
